# Flight log on a Zephyr disk-access block device
#
# Describes the byte region of a SD/MMC card (or any zephyr,...-disk
# device) that the binary data logger writes the live flight log into,
# bypassing the filesystem.  Selected via the chosen entry
# `auxspace,flight-log-disk`.
#
# Example:
#
#   / {
#       chosen {
#           auxspace,flight-log-disk = &flight_log_disk;
#       };
#
#       flight_log_disk: flight-log-disk {
#           compatible = "auxspaceev,flight-log-disk";
#           disk-name = "MMC";
#           offset-bytes = <0x40000000>;  /* skip first 1 GiB of card */
#           size-bytes   = <0x10000000>;  /* 256 MiB region */
#       };
#   };
#
# Copyright (c) 2026 Auxspace e.V.
# SPDX-License-Identifier: Apache-2.0

description: Raw-disk region for the binary flight log.

compatible: "auxspaceev,flight-log-disk"

properties:
  disk-name:
    type: string
    required: true
    description: |
      Zephyr disk-access name of the underlying block device (e.g. "MMC"
      for an SD card slot exposed as zephyr,sdmmc-disk).

  offset-bytes:
    type: int
    required: true
    description: |
      Byte offset of the flight-log region from the start of the disk
      (zero-based).  Allows the flight log to coexist with a filesystem
      that uses the rest of the card; the application is responsible
      for ensuring the filesystem does not overlap this range.  Must
      be a whole multiple of the disk's logical sector size (queried
      at runtime via DISK_IOCTL_GET_SECTOR_SIZE; 512 on every SD/MMC).
      Capped at 4 GiB - 1 by the 32-bit DT cell width.

  size-bytes:
    type: int
    required: true
    description: |
      Byte size of the region reserved for the flight log.  Must be a
      whole multiple of the disk's logical sector size and of
      CONFIG_DATA_LOGGER_BIN_FRAME_SIZE.  Capped at 4 GiB - 1 by the
      32-bit DT cell width.
