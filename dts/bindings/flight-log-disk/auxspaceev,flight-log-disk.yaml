# Flight log on a Zephyr disk-access block device
#
# Describes the byte region of a SD/MMC card (or any zephyr,...-disk
# device) that the binary data logger writes the live flight log into,
# bypassing the filesystem.  Selected via the chosen entry
# `auxspace,flight-log-disk`.
#
# The byte values are 64-bit, encoded as two 32-bit cells <HI LO>, so
# offsets and sizes greater than 4 GiB - 1 are representable.
#
# Example:
#
#   / {
#       chosen {
#           auxspace,flight-log-disk = &flight_log_disk;
#       };
#
#       flight_log_disk: flight-log-disk {
#           compatible = "auxspaceev,flight-log-disk";
#           disk-name = "MMC";
#           offset-bytes = <0x0 0x40000000>;  /* skip first 1 GiB */
#           size-bytes   = <0x0 0x10000000>;  /* 256 MiB region */
#       };
#   };
#
# When `size-bytes` is omitted, the region extends from `offset-bytes`
# to the end of the disk (queried at runtime).
#
# Copyright (c) 2026 Auxspace e.V.
# SPDX-License-Identifier: Apache-2.0

description: Raw-disk region for the binary flight log.

compatible: "auxspaceev,flight-log-disk"

properties:
  disk-name:
    type: string
    required: true
    description: |
      Zephyr disk-access name of the underlying block device (e.g. "MMC"
      for an SD card slot exposed as zephyr,sdmmc-disk).

  offset-bytes:
    type: array
    required: true
    description: |
      64-bit byte offset of the flight-log region from the start of the
      disk (zero-based), encoded as two 32-bit cells <HI LO>.  Allows
      the flight log to coexist with a filesystem that uses the rest of
      the card; the application is responsible for ensuring the
      filesystem does not overlap this range.  Must be a whole multiple
      of the disk's logical sector size (queried at runtime via
      DISK_IOCTL_GET_SECTOR_SIZE; 512 on every SD/MMC).

  size-bytes:
    type: array
    required: false
    description: |
      64-bit byte size of the region reserved for the flight log,
      encoded as two 32-bit cells <HI LO>.  Must be a whole multiple of
      the disk's logical sector size and of
      CONFIG_DATA_LOGGER_BIN_FRAME_SIZE.  When omitted, the region
      extends from `offset-bytes` to the end of the disk (sector count
      queried at runtime via DISK_IOCTL_GET_SECTOR_COUNT).
