description: Common device helper for pyros.

include: base.yaml

properties:
  trigger-gpios:
    type: phandle-array
    required: true
    description: |
      An array of trigger GPIOs to use. Each element
      in the array specifies a GPIO.

  arm-gpios:
    type: phandle-array
    required: true
    description: |
      An array of ARM GPIOs to use. Each element
      in the array specifies a GPIO.
      Usually, every channel can be armed on its
      own, but on smaller hardware, a single arm
      gpio is used to arm all trigger-gpios.
      The number of arm-gpios can either be the
      same as trigger-gpios or 1.

  short-gpios:
    type: phandle-array
    description: |
      An array of short GPIOs to use. If short-gpios
      are defined, every entry in the array corresponds
      to an entry in trigger-gpios.

  cap-gpios:
    type: phandle-array
    description: |
      An array of GPIOs that charge the pyro capacitor.
      If cap-gpios are defined, every entry in the
      array corresponds to an entry in trigger-gpios.

  capv-adcs:
    type: phandle-array
    specifier-space: io-channel
    description: |
      An array of ADCs to get the charge of a capacitor
      of a pyro channel.
      If capv-adcs are defined, every entry in the
      array corresponds to an entry in trigger-gpios.

  capv-max:
    type: array
    description: |
      An array of voltages that define the max charge
      that is set to be on capv-adcs.
      A single voltage means, every adc in capv-adcs
      awaits the same target level.

  sense-adcs:
    type: phandle-array
    specifier-space: io-channel
    description: |
      An array of ADCs to get a pyro channel's health.
      If sense-adcs are defined, every entry in the
      array corresponds to an entry in trigger-gpios.

  sense-max:
    type: array
    description: |
      An array of voltages that define the max voltage
      to be awaited on sense-adcs.
      A single voltage means, every adc in sense-adcs
      awaits the same target level.
