manifest:
  remotes:
    - name: zephyr-rtos
      url-base: https://github.com/zephyrproject-rtos
    - name: auxspace-forked
      url-base: https://github.com/AUXSPACEeV
  defaults:
    remote: auxspace-forked
  projects:
    - name: zephyr
      remote: auxspace-forked
      revision: 0f07a53476dd5edc8c7e20a657ef7828df9d6b89
      import:
        # By using name-allowlist we can clone only the modules that are
        # strictly needed by the application.
        name-allowlist:
          - zephyr
          - cmsis_6    # required by the ARM port for Cortex-M
          - hal_rpi_pico   # required by the rpi_pico boards (raspberrypi based)
          - hal_st   # required for st sensors
          - hal_espressif # required for ESP32
          - fatfs      # required for filesystem operations (ff.h)
          - mcuboot    # required as bootloader for ESP32
          - mbedtls       # required by BT host crypto (pad_link / BLE)
          - tf-psa-crypto # PSA crypto provider used by mbedtls
