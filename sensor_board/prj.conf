# common options, which apply to all boards (will be duplicated in board configs)

# DT options
CONFIG_USE_DT_CODE_PARTITION=y

# Console and Shell
CONFIG_CONSOLE=y
CONFIG_SHELL=y

# Boot banner
CONFIG_BOOT_BANNER_STRING="Booting AURORA"

# Logging
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=2
CONFIG_LOG_TIMESTAMP_USE_REALTIME=y
CONFIG_LOG_SPEED=y
CONFIG_LOG_THREAD_ID_PREFIX=y
CONFIG_LOG_OUTPUT_FORMAT_TIME_TIMESTAMP=y
CONFIG_LOG_CMDS=y
CONFIG_LOG_BACKEND_UART=y

# Keep the UART console active but disable the log backend that prints
# Zephyr logging output to the console.
CONFIG_SHELL_LOG_BACKEND=y

# State machine
CONFIG_AURORA_STATE_MACHINE=y

CONFIG_SENSOR_BOARD_LOG_LEVEL_DBG=y
# CONFIG_UART_CONSOLE_LOG_LEVEL_OFF=y
CONFIG_UART_CONSOLE_LOG_LEVEL_DEFAULT=y
