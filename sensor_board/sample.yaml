#
# This file is provided so that the application can be compiled using Twister,
# the Zephyr testing tool. In this file, multiple combinations can be specified,
# so that you can easily test all of them locally or in CI.
sample:
  description: Sensor Board Application
  name: Sensor Board
common:
  build_only: true
  modules:
    - fatfs
tests:
  app.default:
    platform_allow:
      - sensor_board_v2/rp2040
      - sensor_board_v2/rp2350a/hazard3
    integration_platforms:
      - sensor_board_v2/rp2040
      - sensor_board_v2/rp2350a/hazard3
  app.native_sim:
    build_only: false
    timeout: 180
    harness: console
    harness_config:
      type: one_line
      regex:
        - "simulation complete"
    extra_configs:
      - CONFIG_AURORA_SIM_AUTOTEST=y
    platform_allow:
      - native_sim
    integration_platforms:
      - native_sim
  app.default.sysbuild:
    sysbuild: true
    platform_allow:
      - esp32s3_micrometer/esp32s3/procpu
    integration_platforms:
      - esp32s3_micrometer/esp32s3/procpu
  app.sim:
    extra_args: SNIPPET=sim
    platform_allow:
      - sensor_board_v2/rp2040
      - sensor_board_v2/rp2350a/hazard3
    integration_platforms:
      - sensor_board_v2/rp2040
      - sensor_board_v2/rp2350a/hazard3
  app.debug:
    extra_overlay_confs:
      - debug.conf
    platform_allow:
      - sensor_board_v2/rp2040
      - sensor_board_v2/rp2350a/hazard3
    integration_platforms:
      - sensor_board_v2/rp2040
      - sensor_board_v2/rp2350a/hazard3
  app.debug.sysbuild:
    sysbuild: true
    extra_overlay_confs:
      - debug.conf
    platform_allow:
      - esp32s3_micrometer/esp32s3/procpu
    integration_platforms:
      - esp32s3_micrometer/esp32s3/procpu
