#
# Post-mortem core dump over the serial console. On a fatal error the
# kernel emits base64 "#CD:" lines; capture them from the UART and decode
# off-target with zephyr/scripts/coredump/ against zephyr.elf.
#
# Stack with the debug overlay for symbols + a text backtrace:
#   west build -b micrometer/esp32s3/procpu aurora/sensor_board \
#       -- -DEXTRA_CONF_FILE="debug.conf;coredump.conf"
#
# The #CD: markers are line-tagged, so the parser recovers the dump even
# when log timestamps interleave with it — which is why this beats trying
# to read the raw panic text.

CONFIG_DEBUG_COREDUMP=y
CONFIG_DEBUG_COREDUMP_BACKEND_LOGGING=y

# Registers + the faulting thread's stack only: small and fast over UART,
# enough to reconstruct the backtrace of a NULL-deref crash. Switch to
# CONFIG_DEBUG_COREDUMP_MEMORY_DUMP_THREADS=y if you need every thread's
# stack (larger dump).
CONFIG_DEBUG_COREDUMP_MEMORY_DUMP_MIN=y

# Take the SD card off the panic path. The FS log backend flushes
# synchronously during a panic; a real crash then looks like a freeze.
# Console/UART still gets everything. Disabling it here also doubles as the
# test for whether the SD/FATFS is itself the freeze source.
# if the freezes stop with this off, the card/filesystem is the culprit.
CONFIG_LOG_BACKEND_FS=n
