#
# Bench config for the Raspberry Pi Pico / Pico W (RP2040). Pairs with
# -S sim -S nodisk, e.g.:
#   west build -b rpi_pico/rp2040/w -S sim -S nodisk aurora/sensor_board
#
# The matching .overlay puts the console on USB CDC and wires an HC-12
# to uart1 (TX=GP4, RX=GP5, SET=GP6). The Kconfig body below is the
# same as the Pico 2 W bench conf - keep them in sync when editing.

CONFIG_MAIN_STACK_SIZE=2048
CONFIG_GPIO=y
CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y
CONFIG_UART_LINE_CTRL=y
CONFIG_USB_DEVICE_STACK_NEXT=y
CONFIG_USBD_CDC_ACM_LOG_LEVEL_OFF=y
CONFIG_CDC_ACM_SERIAL_INITIALIZE_AT_BOOT=y
CONFIG_CBPRINTF_FP_SUPPORT=y

CONFIG_LOG_BACKEND_UART=y
CONFIG_LOG_BACKEND_UART_BUFFER_SIZE=32

CONFIG_AURORA_SENSORS=y
CONFIG_IMU=y
CONFIG_IMU_FREQUENCY=100
CONFIG_BARO=y
CONFIG_BARO_FREQUENCY=100
CONFIG_FILTER=y

CONFIG_AURORA_TELEMETRY=y
CONFIG_AURORA_TELEMETRY_HC12_MIN_INTERVAL_MS=100
CONFIG_AURORA_TELEMETRY_HC12_SHELL=y

CONFIG_LOG_BACKEND_UART=y
CONFIG_LOG_BACKEND_UART_BUFFER_SIZE=32
