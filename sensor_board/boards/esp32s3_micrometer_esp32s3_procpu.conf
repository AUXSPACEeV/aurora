CONFIG_LOG_BACKEND_FS=y
CONFIG_LOG_BACKEND_FS_DIR="/MMC:/logs"
CONFIG_LOG_BACKEND_FS_FILES_LIMIT=512
CONFIG_LOG_BACKEND_FS_FILE_SIZE=100000000
CONFIG_LOG_BACKEND_UART=y
CONFIG_LOG_BACKEND_UART_BUFFER_SIZE=32
CONFIG_SHELL_LOG_BACKEND=n
CONFIG_DATA_LOGGER=y
CONFIG_DATA_LOGGER_INFLUX=y
CONFIG_DATA_LOGGER_BASE_PATH="/MMC:/data"
CONFIG_DATA_LOGGER_SHELL=y
CONFIG_MMC_STACK=y
CONFIG_AURORA_NOTIFY=y
CONFIG_AURORA_NOTIFY_BUZZER=y
CONFIG_AURORA_NOTIFY_LED=y
CONFIG_AURORA_STATE_MACHINE_AUDIT=y
CONFIG_AURORA_STATE_MACHINE_AUDIT_BASE_PATH="/MMC:/state"
CONFIG_AURORA_POWERFAIL=y

# Flight of about 50-60 m height with a 6N Motor

# Metrics
CONFIG_BOOST_ACCELERATION=15
CONFIG_BOOST_ALTITUDE=5
CONFIG_BURNOUT_ACCELERATION=10
CONFIG_MAIN_DESCENT_HEIGHT=25
CONFIG_LANDING_VELOCITY=2

# Timers
CONFIG_BOOST_TIMER_MS=200

# Timeouts
CONFIG_APOGEE_TIMEOUT_MS=20000
CONFIG_MAIN_TIMEOUT_MS=2000
