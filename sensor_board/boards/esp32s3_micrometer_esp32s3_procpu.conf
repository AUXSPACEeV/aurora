CONFIG_USE_DT_CODE_PARTITION=y
CONFIG_GPIO=y
CONFIG_LOG_PROCESS_THREAD_STACK_SIZE=4096
CONFIG_PYRO=y
CONFIG_PYRO_SHELL=y
CONFIG_AURORA_SENSORS=y
CONFIG_IMU=y
CONFIG_BARO=y
CONFIG_FILTER=y
CONFIG_FILTER_Q_VEL_MILLISCALE=3000
CONFIG_FILTER_R_MILLISCALE=6000
CONFIG_FILTER_APOGEE_DEBOUNCE_SAMPLES=3
CONFIG_ADC=y
CONFIG_ADC_SHELL=y
CONFIG_CAN=y
CONFIG_CAN_SHELL=y
CONFIG_UART_CONSOLE=y
CONFIG_SHELL_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
CONFIG_PWM=y
CONFIG_PWM_SHELL=y
CONFIG_LED=y
CONFIG_LED_PWM=y
CONFIG_SENSOR=y
CONFIG_LSM6DSO=y
CONFIG_LSM6DSO_TRIGGER_OWN_THREAD=y
CONFIG_LSM6DSO_THREAD_STACK_SIZE=1024
