CONFIG_LSM6DSO_ENABLE_TEMP=y
CONFIG_LPS22HH=y
CONFIG_LPS22HH_TRIGGER_OWN_THREAD=y
CONFIG_LPS22HH_THREAD_STACK_SIZE=1024
CONFIG_LPS22HH_THREAD_PRIORITY=4
CONFIG_UART_LINE_CTRL=y
# CONFIG_UDC_DRIVER is not set
# CONFIG_UDC_DWC2 is not set
# CONFIG_USB_DEVICE_STACK is not set
# CONFIG_USB_DEVICE_STACK_NEXT is not set
# CONFIG_COMMON_LIBC_REMOVE is not set
CONFIG_FILE_SYSTEM=y
CONFIG_FILE_SYSTEM_SHELL=y
CONFIG_FILE_SYSTEM_SHELL_TEST_COMMANDS=y
CONFIG_FILE_SYSTEM_MKFS=y
CONFIG_FAT_FILESYSTEM_ELM=y
CONFIG_FS_FATFS_EXFAT=y
CONFIG_FS_FATFS_LBA64=y
CONFIG_FS_FATFS_CUSTOM_MOUNT_POINT_COUNT=1
