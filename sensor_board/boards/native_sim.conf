# native_sim target for data-path / filter / thread-priority testing.
# Real sensor drivers are replaced by the synthetic profile generator.

CONFIG_MAIN_STACK_SIZE=4096

# Console over stdout
CONFIG_UART_CONSOLE=y
CONFIG_UART_NATIVE_PTY_0_ON_STDINOUT=y
CONFIG_SHELL_STACK_SIZE=4096

# FAT filesystem on a RAM disk
CONFIG_DISK_DRIVERS=y
CONFIG_FILE_SYSTEM=y
CONFIG_FILE_SYSTEM_SHELL=y
CONFIG_FILE_SYSTEM_SHELL_TEST_COMMANDS=y
CONFIG_FILE_SYSTEM_MKFS=y
CONFIG_FAT_FILESYSTEM_ELM=y
CONFIG_FS_FATFS_LFN=y
CONFIG_FS_FATFS_FSTAB_AUTOMOUNT=y
# logging
CONFIG_LOG_MODE_DEFERRED=y
CONFIG_LOG_BACKEND_UART=n
CONFIG_SHELL_LOG_BACKEND=n
CONFIG_LOG_BACKEND_FS=y
CONFIG_LOG_BACKEND_FS_DIR="/RAM:/logs"
CONFIG_LOG_BACKEND_FS_FILES_LIMIT=512
CONFIG_LOG_PROCESS_THREAD_STACK_SIZE=4096
# Data logger
CONFIG_DATA_LOGGER=y
CONFIG_DATA_LOGGER_BIN_BACKEND_FLASH=y
CONFIG_DATA_LOGGER_CONVERT_INFLUX=y
CONFIG_DATA_LOGGER_CONVERT_CSV=y
CONFIG_DATA_LOGGER_BASE_PATH="/RAM:/data"
CONFIG_DATA_LOGGER_SHELL=y
# Live flight log on simulated raw flash (see native_sim.overlay).
CONFIG_FLASH_SIMULATOR=y
CONFIG_FLASH_SIMULATOR_STATS=n
# State machine audit
CONFIG_AURORA_STATE_MACHINE_AUDIT=y
CONFIG_AURORA_STATE_MACHINE_AUDIT_BASE_PATH="/RAM:/state"
# Filtering
CONFIG_FILTER=y
CONFIG_FILTER_Q_VEL_MILLISCALE=3000
CONFIG_FILTER_R_MILLISCALE=6000
CONFIG_FILTER_APOGEE_DEBOUNCE_SAMPLES=3

# Heap required by k_malloc in formatter backends
CONFIG_HEAP_MEM_POOL_SIZE=8192

# Aurora sensor HAL stays on so zbus channels and conversion helpers are built,
# but AURORA_FAKE_SENSORS replaces the hardware polling threads.
CONFIG_SENSOR=y
CONFIG_AURORA_SENSORS=y
CONFIG_IMU=y
CONFIG_IMU_UP_AXIS_POS_Y=y
CONFIG_IMU_FREQUENCY=1000
CONFIG_IMU_CALIBRATION_SAMPLES=100
CONFIG_BARO=y
CONFIG_BARO_FREQUENCY=1000
CONFIG_FILTER=y
CONFIG_FILTER_Q_VEL_MILLISCALE=3000
CONFIG_FILTER_R_MILLISCALE=6000
CONFIG_FILTER_APOGEE_DEBOUNCE_SAMPLES=3
CONFIG_AURORA_FAKE_SENSORS=y

# No pyro, no storage, no notifications, no powerfail on native_sim.

# Thresholds mirror the simulated short-flight profile.
CONFIG_BOOST_ACCELERATION=15
CONFIG_BOOST_ALTITUDE=5
CONFIG_BURNOUT_ACCELERATION=10
CONFIG_MAIN_DESCENT_HEIGHT=50
CONFIG_LANDING_VELOCITY=2
CONFIG_BOOST_TIMER_MS=200
CONFIG_APOGEE_TIMEOUT_MS=60000
CONFIG_MAIN_TIMEOUT_MS=2000
