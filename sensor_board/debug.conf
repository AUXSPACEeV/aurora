# This is a Kconfig fragment which can be used to enable debug-related options
# in the application. See the README for more details.

# kernel
CONFIG_DEBUG=y
CONFIG_DEBUG_THREAD_INFO=y

# Stack-overflow sanitisers.
#
# HW_STACK_PROTECTION arms the MPU as a hardware guard page below
# each thread stack: an overflow faults *at the instruction that
# blows the boundary*, not later when something happens to notice.
# This is what makes the EXCCAUSE panic point at the real culprit
# (e.g. fs_write deep in FATFS) instead of a random thread that
# stepped on corrupted memory.
CONFIG_HW_STACK_PROTECTION=y
CONFIG_INIT_STACKS=y
CONFIG_THREAD_STACK_INFO=y
CONFIG_STACK_USAGE=y
CONFIG_EXCEPTION_STACK_TRACE=y

# compiler
CONFIG_SYMTAB=y
CONFIG_SYMTAB_SHELL=y
CONFIG_DEBUG_OPTIMIZATIONS=y

# thread analyzing
CONFIG_THREAD_ANALYZER=y
CONFIG_THREAD_ANALYZER_AUTO=y
CONFIG_THREAD_ANALYZER_USE_PRINTK=y

# logging
CONFIG_LOG=y

CONFIG_FS_LOG_LEVEL_DBG=y
CONFIG_PYRO_LOG_LEVEL_DBG=y
CONFIG_AURORA_SENSORS_LOG_LEVEL_DBG=y
CONFIG_AURORA_FILTER_LOG_LEVEL_DBG=y
CONFIG_DATA_LOGGER_LOG_LEVEL_DBG=y
CONFIG_STATE_MACHINE_LOG_LEVEL_DBG=y
CONFIG_AURORA_NOTIFY_LOG_LEVEL_DBG=y
CONFIG_AURORA_PWM_MELODY_LOG_LEVEL_DBG=y
CONFIG_AURORA_POWERFAIL_LOG_LEVEL_DBG=y
CONFIG_SENSOR_BOARD_LOG_LEVEL_DBG=y
CONFIG_AURORA_TELEMETRY_LOG_LEVEL_DBG=y
CONFIG_AURORA_PAD_LINK_LOG_LEVEL_DBG=y

# powerfail
CONFIG_AURORA_POWERFAIL_SHUTDOWN=n

# Bench-only `wdtrec` shell for debugging the recovery path.
CONFIG_AURORA_WDT_RECOVERY_SHELL=y
