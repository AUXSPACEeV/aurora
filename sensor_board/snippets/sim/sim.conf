# Enables synthetic IMU/baro generation and the `sim` shell command set.
# Safe to layer on any board: pulls the file-scoped fake sensor threads
# in, and main.c's real polling threads compile out.
# Fake sensors use the Y axis as their vertical axis

CONFIG_AURORA_FAKE_SENSORS=y
CONFIG_IMU_UP_AXIS_POS_Y=y

# remove real sensors
CONFIG_SENSOR=n

# Thresholds mirror the simulated short-flight profile.
CONFIG_BOOST_ACCELERATION=15
CONFIG_BOOST_ALTITUDE=5
CONFIG_BURNOUT_ACCELERATION=10
CONFIG_MAIN_DESCENT_HEIGHT=50
CONFIG_LANDING_VELOCITY=2
CONFIG_BOOST_TIMER_MS=200
CONFIG_APOGEE_TIMEOUT_MS=60000
CONFIG_MAIN_TIMEOUT_MS=2000
