#
# Compile out everything that touches the SD card so the board can run
# without media. Telemetry (HC-12) and the rest of the flight stack are
# untouched.

# Filesystem / FAT
CONFIG_FILE_SYSTEM=n
CONFIG_FILE_SYSTEM_SHELL=n
CONFIG_FILE_SYSTEM_SHELL_TEST_COMMANDS=n
CONFIG_FILE_SYSTEM_MKFS=n
CONFIG_FAT_FILESYSTEM_ELM=n
CONFIG_FS_FATFS_EXFAT=n
CONFIG_FS_FATFS_LBA64=n

# FS-backed log backend
CONFIG_LOG_BACKEND_FS=n

# Data logger disk backend + format converters (both need FILE_SYSTEM)
CONFIG_DATA_LOGGER=n
CONFIG_DATA_LOGGER_BIN_BACKEND_DISK=n
CONFIG_DATA_LOGGER_DISK_AUTO_MKFS=n
CONFIG_DATA_LOGGER_CONVERT_INFLUX=n
CONFIG_DATA_LOGGER_CONVERT_CSV=n

# SD/MMC stack
CONFIG_MMC_STACK=n

# State machine audit writes to /MMC:/state
CONFIG_AURORA_STATE_MACHINE_AUDIT=n
