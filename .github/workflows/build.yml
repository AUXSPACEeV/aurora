name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    name: Build sensor_board and tests
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: aurora
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Zephyr project
        uses: zephyrproject-rtos/action-zephyr-setup@v1
        with:
          app-path: aurora
          toolchains: arm-zephyr-eabi:riscv64-zephyr-elf:x86_64-zephyr-elf:xtensa-espressif_esp32s3_zephyr-elf
          ccache-cache-key: ${{ matrix.os }}

      - name: Build firmware
        working-directory: aurora
        shell: bash
        run: |
          west twister -T sensor_board -v --inline-logs --integration

      - name: Twister Tests
        working-directory: aurora
        shell: bash
        run: |
          west twister -T tests -v --inline-logs --integration
