name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    name: Build sensor_board and tests
    strategy:
      fail-fast: false
      # Matrix node is kept for future use
      matrix:
        os: [ubuntu-22.04]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: aurora
          persist-credentials: false
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Zephyr project
        uses: zephyrproject-rtos/action-zephyr-setup@v1
        with:
          app-path: aurora
          toolchains: arm-zephyr-eabi:riscv64-zephyr-elf:x86_64-zephyr-elf:xtensa-espressif_esp32s3_zephyr-elf
          ccache-cache-key: ${{ matrix.os }}

      - name: Build firmware
        working-directory: aurora
        shell: bash
        run: |
          west twister -T sensor_board -v --inline-logs --integration --outdir twister-out-firmware

      - name: Twister Tests
        working-directory: aurora
        shell: bash
        run: |
          west twister -T tests -v --inline-logs --integration --outdir twister-out-tests

      - name: Collect firmware binaries
        if: always()
        shell: bash
        run: |
          mkdir -p firmware-artifacts
          for board_dir in aurora/twister-out-firmware/*/; do
            board=$(basename "$board_dir")
            find "$board_dir" \( -name "zephyr.bin" -o -name "zephyr.elf" -o -name "zephyr.hex" -o -name "zephyr.uf2" -o -name "zephyr.signed.bin" -o -name "zephyr.exe" \) \
              | while read -r f; do
                rel="${f#"$board_dir"}"
                mkdir -p "firmware-artifacts/$board/$(dirname "$rel")"
                cp "$f" "firmware-artifacts/$board/$rel"
              done
          done

      - name: Upload firmware binaries
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: twister-artifacts-${{ matrix.os }}
          path: firmware-artifacts/
          if-no-files-found: warn
