name: Container

on:
  push:
    branches: [main]
    paths:
      - 'container/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'container/**'
  workflow_dispatch:

permissions:
  packages: write

jobs:
  check:
    name: Check container version
    runs-on: ubuntu-22.04
    permissions:
      packages: read
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read container version
        run: echo "CONTAINER_VERSION=$(cat container/version)" >> $GITHUB_ENV

      - name: Set image name
        run: echo "IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if image exists
        id: check
        run: |
          if docker manifest inspect ${{ env.IMAGE }}:${{ env.CONTAINER_VERSION }} > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "::notice::Image ${{ env.IMAGE }}:${{ env.CONTAINER_VERSION }} already exists — skipping Docker build."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

  build:
    name: Build ${{ matrix.platform }}
    needs: check
    if: needs.check.outputs.exists != 'true' && github.event_name != 'pull_request'
    runs-on: ${{ matrix.runner }}
    permissions:
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            dockerfile: Dockerfile_x86_64
            platform: linux/amd64
          - runner: ubuntu-24.04-arm
            dockerfile: Dockerfile_arm64
            platform: linux/arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read container version
        run: echo "CONTAINER_VERSION=$(cat container/version)" >> $GITHUB_ENV

      - name: Set image name
        run: echo "IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: container
          file: container/${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          build-args: |
            ZEPHYR_SOURCE_SW_VERSION=${{ env.CONTAINER_VERSION }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  manifest:
    name: Push manifest
    needs: [check, build]
    if: needs.check.outputs.exists != 'true'
    runs-on: ubuntu-22.04
    permissions:
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read container version
        run: echo "CONTAINER_VERSION=$(cat container/version)" >> $GITHUB_ENV

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          pattern: digest-*
          merge-multiple: true
          path: /tmp/digests

      - name: Set image name
        run: echo "IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest
        run: |
          docker buildx imagetools create \
            --tag ${{ env.IMAGE }}:${{ env.CONTAINER_VERSION }} \
            --tag ${{ env.IMAGE }}:latest \
            $(printf '${{ env.IMAGE }}@sha256:%s ' $(ls /tmp/digests))
