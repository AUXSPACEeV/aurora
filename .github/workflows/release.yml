name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  actions: read

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - board: sensor_board_v2/rp2040
            artifact: sensor_board_v2_rp2040
            toolchain: arm-zephyr-eabi
            extra_args: "--sysbuild"
          - board: sensor_board_v2/rp2350a/hazard3
            artifact: sensor_board_v2_rp2350a_hazard3
            toolchain: riscv64-zephyr-elf
            extra_args: ""
          - board: esp32s3_micrometer/esp32s3/procpu
            artifact: esp32s3_micrometer
            toolchain: xtensa-espressif_esp32s3_zephyr-elf
            extra_args: "--sysbuild"
          - board: native_sim
            artifact: native_sim
            toolchain: x86_64-zephyr-elf
            extra_args: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: aurora
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Zephyr project
        uses: zephyrproject-rtos/action-zephyr-setup@v1
        with:
          app-path: aurora
          toolchains: ${{ matrix.toolchain }}
          ccache-cache-key: ubuntu-22.04-release-${{ matrix.artifact }}

      - name: Build firmware
        working-directory: aurora
        shell: bash
        run: |
          west build -b ${{ matrix.board }} ${{ matrix.extra_args }} sensor_board

      - name: Collect artifacts
        working-directory: aurora
        shell: bash
        run: |
          mkdir -p dist/${{ matrix.artifact }}
          if [ -d "build/mcuboot" ]; then
            # sysbuild: collect mcuboot and signed app binaries
            for f in build/mcuboot/zephyr/zephyr.{elf,bin,hex}; do
              [ -f "${f}" ] && cp "${f}" "dist/${{ matrix.artifact }}/mcuboot.${f##*.}"
            done
            for f in build/sensor_board/zephyr/zephyr.signed.{elf,bin}; do
              [ -f "${f}" ] && cp "${f}" "dist/${{ matrix.artifact }}/${{ matrix.artifact }}.signed.${f##*.}"
            done
            for f in build/sensor_board/zephyr/zephyr.{elf,bin,hex}; do
              [ -f "${f}" ] && cp "${f}" "dist/${{ matrix.artifact }}/${{ matrix.artifact }}.${f##*.}"
            done
          else
            for ext in elf uf2 bin hex exe; do
              src="build/zephyr/zephyr.${ext}"
              [ -f "${src}" ] && cp "${src}" "dist/${{ matrix.artifact }}/${{ matrix.artifact }}.${ext}"
            done
          fi
          tar -cJf "dist/${{ matrix.artifact }}.tar.xz" -C dist "${{ matrix.artifact }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.artifact }}
          path: aurora/dist/${{ matrix.artifact }}.tar.xz

  docs-pdf:
    # Reuses the PDF artifact produced by the docs workflow on the same
    # commit. Falls back to building from scratch only if no successful
    # docs run exists for this commit (e.g. a tag pushed from a branch
    # that never landed on main).
    name: Collect documentation PDF
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: aurora
          persist-credentials: false
          lfs: true

      - name: Download PDF from docs workflow
        id: download
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          run_id=$(gh run list \
            --repo "${{ github.repository }}" \
            --workflow docs.yml \
            --commit "${{ github.sha }}" \
            --status success \
            --limit 1 \
            --json databaseId \
            --jq '.[0].databaseId')
          if [ -z "${run_id}" ] || [ "${run_id}" = "null" ]; then
            echo "No successful docs.yml run found for ${{ github.sha }}"
            exit 1
          fi
          echo "Reusing PDF from docs.yml run ${run_id}"
          gh run download "${run_id}" \
            --repo "${{ github.repository }}" \
            --name aurora-pdf \
            --dir pdf
          cp pdf/aurora.pdf "aurora-${{ github.ref_name }}.pdf"

      - name: Set up Python
        if: steps.download.outcome == 'failure'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Zephyr project
        if: steps.download.outcome == 'failure'
        uses: zephyrproject-rtos/action-zephyr-setup@v1
        with:
          app-path: aurora
          toolchains: arm-zephyr-eabi:riscv64-zephyr-elf:xtensa-espressif_esp32s3_zephyr-elf
          ccache-cache-key: ubuntu-22.04-docs

      - name: Install dependencies
        if: steps.download.outcome == 'failure'
        run: |
          wget --no-verbose "https://github.com/doxygen/doxygen/releases/download/Release_1_14_0/doxygen-1.14.0.linux.bin.tar.gz"
          tar xf doxygen-1.14.0.linux.bin.tar.gz
          echo "${PWD}/doxygen-1.14.0/bin" >> $GITHUB_PATH
          pip install -r aurora/doc/requirements.txt \
            -r zephyr/scripts/requirements-base.txt \
            -r zephyr/scripts/requirements-compliance.txt \
            -r zephyr/scripts/requirements-build-test.txt
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpango-1.0-0 libpangoft2-1.0-0 libharfbuzz0b \
            libgdk-pixbuf-2.0-0 shared-mime-info fonts-dejavu

      - name: Build PDF
        if: steps.download.outcome == 'failure'
        working-directory: aurora/doc
        run: |
          doxygen
          make simplepdf
          cp _build_sphinx/simplepdf/aurora.pdf "${GITHUB_WORKSPACE}/aurora-${{ github.ref_name }}.pdf"

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: aurora-pdf-release
          path: aurora-${{ github.ref_name }}.pdf

  release:
    name: Publish release
    needs: [build, docs-pdf]
    runs-on: ubuntu-22.04
    steps:
      - name: Download firmware artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: firmware-*
          merge-multiple: true
          path: dist

      - name: Download PDF artifact
        uses: actions/download-artifact@v4
        with:
          name: aurora-pdf-release
          path: dist

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
