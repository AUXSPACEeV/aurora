name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - board: sensor_board_v2/rp2040
            artifact: sensor_board_v2_rp2040
            toolchain: arm-zephyr-eabi
          - board: sensor_board_v2/rp2350a/hazard3
            artifact: sensor_board_v2_rp2350a_hazard3
            toolchain: riscv64-zephyr-elf
          - board: esp32s3_micrometer/esp32s3/procpu
            artifact: esp32s3_micrometer
            toolchain: xtensa-espressif_esp32s3_zephyr-elf
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: aurora
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Zephyr project
        uses: zephyrproject-rtos/action-zephyr-setup@v1
        with:
          app-path: aurora
          toolchains: ${{ matrix.toolchain }}
          ccache-cache-key: ubuntu-22.04-release-${{ matrix.artifact }}

      - name: Build firmware
        working-directory: aurora
        shell: bash
        run: |
          west build -b ${{ matrix.board }} sensor_board

      - name: Collect artifacts
        working-directory: aurora
        shell: bash
        run: |
          mkdir -p dist
          for ext in elf uf2 bin; do
            src="build/zephyr/zephyr.${ext}"
            [ -f "${src}" ] && cp "${src}" "dist/${{ matrix.artifact }}.${ext}"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.artifact }}
          path: aurora/dist/

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: firmware-*
          merge-multiple: true
          path: dist

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  docker-check:
    name: Check container version
    runs-on: ubuntu-22.04
    permissions:
      packages: read
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read container version
        run: echo "CONTAINER_VERSION=$(cat container/version)" >> $GITHUB_ENV

      - name: Set image name
        run: echo "IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if image exists
        id: check
        run: |
          if docker manifest inspect ${{ env.IMAGE }}:${{ env.CONTAINER_VERSION }} > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "::notice::Image ${{ env.IMAGE }}:${{ env.CONTAINER_VERSION }} already exists — skipping Docker build."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

  docker:
    name: Docker ${{ matrix.platform }}
    needs: docker-check
    if: needs.docker-check.outputs.exists != 'true'
    runs-on: ${{ matrix.runner }}
    permissions:
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            dockerfile: Dockerfile_x86_64
            platform: linux/amd64
          - runner: ubuntu-24.04-arm
            dockerfile: Dockerfile_arm64
            platform: linux/arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        run: echo "IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: container
          file: container/${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          build-args: |
            ZEPHYR_SOURCE_SW_VERSION=${{ github.ref_name }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  docker-manifest:
    name: Docker manifest
    needs: [docker-check, docker]
    if: needs.docker-check.outputs.exists != 'true'
    runs-on: ubuntu-22.04
    permissions:
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read container version
        run: echo "CONTAINER_VERSION=$(cat container/version)" >> $GITHUB_ENV

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          pattern: digest-*
          merge-multiple: true
          path: /tmp/digests

      - name: Set image name
        run: echo "IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest
        run: |
          docker buildx imagetools create \
            --tag ${{ env.IMAGE }}:${{ env.CONTAINER_VERSION }} \
            --tag ${{ env.IMAGE }}:latest \
            $(printf '${{ env.IMAGE }}@sha256:%s ' $(ls /tmp/digests))
