name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - board: sensor_board_v2/rp2040
            artifact: sensor_board_v2_rp2040
            toolchain: arm-zephyr-eabi
            extra_args: ""
          - board: sensor_board_v2/rp2350a/hazard3
            artifact: sensor_board_v2_rp2350a_hazard3
            toolchain: riscv64-zephyr-elf
            extra_args: ""
          - board: esp32s3_micrometer/esp32s3/procpu
            artifact: esp32s3_micrometer
            toolchain: xtensa-espressif_esp32s3_zephyr-elf
            extra_args: "--sysbuild"
          - board: native_sim
            artifact: native_sim
            toolchain: x86_64-zephyr-elf
            extra_args: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: aurora
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Zephyr project
        uses: zephyrproject-rtos/action-zephyr-setup@v1
        with:
          app-path: aurora
          toolchains: ${{ matrix.toolchain }}
          ccache-cache-key: ubuntu-22.04-release-${{ matrix.artifact }}

      - name: Build firmware
        working-directory: aurora
        shell: bash
        run: |
          west build -b ${{ matrix.board }} ${{ matrix.extra_args }} sensor_board

      - name: Collect artifacts
        working-directory: aurora
        shell: bash
        run: |
          mkdir -p dist/${{ matrix.artifact }}
          if [ -d "build/mcuboot" ]; then
            # sysbuild: collect mcuboot and signed app binaries
            for f in build/mcuboot/zephyr/zephyr.{elf,bin,hex}; do
              [ -f "${f}" ] && cp "${f}" "dist/${{ matrix.artifact }}/mcuboot.${f##*.}"
            done
            for f in build/sensor_board/zephyr/zephyr.signed.{elf,bin}; do
              [ -f "${f}" ] && cp "${f}" "dist/${{ matrix.artifact }}/${{ matrix.artifact }}.signed.${f##*.}"
            done
            for f in build/sensor_board/zephyr/zephyr.{elf,bin,hex}; do
              [ -f "${f}" ] && cp "${f}" "dist/${{ matrix.artifact }}/${{ matrix.artifact }}.${f##*.}"
            done
          else
            for ext in elf uf2 bin hex exe; do
              src="build/zephyr/zephyr.${ext}"
              [ -f "${src}" ] && cp "${src}" "dist/${{ matrix.artifact }}/${{ matrix.artifact }}.${ext}"
            done
          fi
          tar -cJf "dist/${{ matrix.artifact }}.tar.xz" -C dist "${{ matrix.artifact }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.artifact }}
          path: aurora/dist/${{ matrix.artifact }}.tar.xz

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: firmware-*
          merge-multiple: true
          path: dist

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
