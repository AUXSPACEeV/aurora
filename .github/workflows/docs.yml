name: Documentation

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: aurora
          persist-credentials: false
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Zephyr project
        uses: zephyrproject-rtos/action-zephyr-setup@v1
        with:
          app-path: aurora
          toolchains: arm-zephyr-eabi:riscv64-zephyr-elf:xtensa-espressif_esp32s3_zephyr-elf
          ccache-cache-key: ubuntu-22.04-docs

      - name: Install dependencies
        run: |
          wget --no-verbose "https://github.com/doxygen/doxygen/releases/download/Release_1_14_0/doxygen-1.14.0.linux.bin.tar.gz"
          tar xf doxygen-1.14.0.linux.bin.tar.gz
          echo "${PWD}/doxygen-1.14.0/bin" >> $GITHUB_PATH
          pip install -r aurora/doc/requirements.txt \
            -r zephyr/scripts/requirements-base.txt \
            -r zephyr/scripts/requirements-compliance.txt \
            -r zephyr/scripts/requirements-build-test.txt

      - name: Install PDF runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpango-1.0-0 libpangoft2-1.0-0 libharfbuzz0b \
            libgdk-pixbuf-2.0-0 shared-mime-info fonts-dejavu

      - name: Build
        working-directory: aurora/doc
        run: |
          doxygen

          SPHINXOPTS="-W" make html
          # simplepdf reuses the doctree from the html build; -W is not used
          # because breathe-generated cross-references emit non-fatal warnings.
          make simplepdf

          mkdir deploy
          mv _build_doxygen/html deploy/doxygen
          mv _build_sphinx/html/* deploy
          cp _build_sphinx/simplepdf/aurora.pdf deploy/aurora.pdf

      - name: Setup pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v4

      - name: Upload pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: aurora/doc/deploy

      - name: Upload artifacts
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: docs
          path: aurora/doc/deploy

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: aurora-pdf
          path: aurora/doc/_build_sphinx/simplepdf/aurora.pdf

  deploy:
    name: Deploy
    runs-on: ubuntu-22.04
    needs: build
    if: github.event_name != 'pull_request'
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
