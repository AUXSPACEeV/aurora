CONFIG_ZTEST=y

CONFIG_AURORA_PAD_LINK=y

# Required for the imu_data_chan/baro_data_chan zbus channel
# definitions and for sm_inputs/sm_state. No real hardware is
# touched in this test.
CONFIG_AURORA_SENSORS=y
CONFIG_IMU=y
CONFIG_BARO=y
CONFIG_AURORA_STATE_MACHINE=y
CONFIG_ZBUS=y

# pad_link selects BT + BT_PERIPHERAL. The test never calls
# bt_enable(): we only need the GATT macros to compile and the zbus
# listeners to register. No HCI traffic is exchanged.
CONFIG_BT_DEVICE_NAME="aurora-test"
