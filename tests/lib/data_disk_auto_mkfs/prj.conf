CONFIG_ZTEST=y

# Data logger with the disk-backed binary backend and the auto-mkfs guard
# under test.
CONFIG_DATA_LOGGER=y
CONFIG_DATA_LOGGER_BIN=y
CONFIG_DATA_LOGGER_BIN_BACKEND_DISK=y
CONFIG_DATA_LOGGER_DISK_AUTO_MKFS=y

# RAM disk + FatFS volume, both auto-mounted via the DTS overlay before
# any test runs.  The auto-mkfs hook (SYS_INIT, APPLICATION level) runs
# after the fstab automount and is what reformats the blank disk.
CONFIG_DISK_DRIVERS=y
CONFIG_FILE_SYSTEM=y
CONFIG_FAT_FILESYSTEM_ELM=y
CONFIG_FS_FATFS_LFN=y
CONFIG_FS_FATFS_FSTAB_AUTOMOUNT=y

# Heap for FatFs MKFS scratch buffers.
CONFIG_HEAP_MEM_POOL_SIZE=8192
