CONFIG_ZTEST=y
CONFIG_DATA_LOGGER=y

# FAT filesystem on a RAM disk for the CSV / Influx conversion targets
CONFIG_DISK_DRIVERS=y
CONFIG_FILE_SYSTEM=y
CONFIG_FILE_SYSTEM_MKFS=y
CONFIG_FAT_FILESYSTEM_ELM=y
CONFIG_FS_FATFS_LFN=y
CONFIG_FS_FATFS_FSTAB_AUTOMOUNT=y

# Live flight log on simulated raw flash (see qemu_x86.overlay)
CONFIG_FLASH_SIMULATOR=y
CONFIG_FLASH_SIMULATOR_STATS=n
# qemu_x86's sim_flash uses 1 KiB erase blocks; size each frame to match.
CONFIG_DATA_LOGGER_BIN_FRAME_SIZE=1024

# Heap required by k_malloc in formatter backends
CONFIG_HEAP_MEM_POOL_SIZE=8192
