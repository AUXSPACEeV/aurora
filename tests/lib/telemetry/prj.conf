CONFIG_ZTEST=y

CONFIG_AURORA_TELEMETRY=y
CONFIG_AURORA_TELEMETRY_HC12=y

# Emulated UART for the HC-12 backend: keeps frame bytes off the real
# uart0 that carries ztest output. UART_EMUL depends on the broader
# EMUL framework, so both have to be enabled explicitly.
CONFIG_EMUL=y
CONFIG_UART_EMUL=y

# Pin the rate-limit window so the rate-limiter test exercises real
# state without being timing-fragile.
CONFIG_AURORA_TELEMETRY_HC12_MIN_INTERVAL_MS=50

# The state machine isn't actually used here, but the telemetry API
# pulls in sm_state / sm_inputs from its header.
CONFIG_AURORA_STATE_MACHINE=y
